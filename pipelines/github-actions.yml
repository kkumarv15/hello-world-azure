name: Azure DevSecOps CI/CD

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  AZURE_RESOURCE_GROUP: rg-hello-world-dev
  AZURE_WEBAPP_NAME: app-hello-world-dev
  LOCATION: eastus
  APP_NAME: hello-world
  ENVIRONMENT: dev

jobs:
  build-and-secure:
    name: Build, Test, SonarQube & Trivy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './app/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run tests with coverage
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./app/coverage
          retention-days: 7

      # ---- SonarQube SAST Scan ----
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        if: secrets.SONAR_TOKEN != ''
        continue-on-error: true
        with:
          projectBaseDir: ./app
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info
            -Dsonar.testExecutionReportPaths=./coverage/junit.xml
            -Dsonar.coverage.exclusions=tests/**
            -Dsonar.exclusions=node_modules/**,coverage/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: SonarQube — Skipped info
        if: secrets.SONAR_TOKEN == ''
        run: echo "⚠️ SonarQube skipped — set SONAR_TOKEN and SONAR_HOST_URL secrets"

      # ---- Build Docker Image ----
      - name: Build Docker image
        run: |
          docker build -t ${{ env.APP_NAME }}:${{ github.sha }} .
          docker tag ${{ env.APP_NAME }}:${{ github.sha }} ${{ env.APP_NAME }}:latest

      # ---- Trivy Container Vulnerability Scan ----
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: '${{ env.APP_NAME }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security Tab
        continue-on-error: true
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ./app/trivy-results.sarif

      # ---- Package App for Zip Deploy ----
      - name: Package application
        if: always()
        run: |
          mkdir -p ${{ github.workspace }}/deploy
          cd ${{ github.workspace }}/app
          zip -r ${{ github.workspace }}/deploy/app.zip . \
            -x "node_modules/*" "coverage/*" ".git/*" ".github/*"
          echo "App packaged -> ${{ github.workspace }}/deploy/app.zip ($(wc -c < ${{ github.workspace }}/deploy/app.zip) bytes)"

      - name: Upload deployment artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drop
          path: ${{ github.workspace }}/deploy/app.zip
          retention-days: 7
          if-no-files-found: warn

  deploy:
    name: Deploy to Azure
    needs: build-and-secure
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Infrastructure (Bicep)
        continue-on-error: true
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az deployment sub create \
              --name 'gha-${{ github.run_id }}-${{ env.ENVIRONMENT }}' \
              --location ${{ env.LOCATION }} \
              --template-file infra/main.bicep \
              --parameters \
                appName=${{ env.APP_NAME }} \
                environment=${{ env.ENVIRONMENT }} \
                location=${{ env.LOCATION }}

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: drop
          path: ./deploy

      - name: Deploy to Azure Web App
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./deploy/app.zip
          runtime-stack: 'NODE|20-lts'

      - name: Smoke Test
        continue-on-error: true
        uses: azure/CLI@v2
        with:
          inlineScript: |
            WEB_APP_NAME="${{ env.AZURE_WEBAPP_NAME }}"
            HOSTNAME=$(az webapp show \
              --name $WEB_APP_NAME \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query defaultHostName \
              --output tsv 2>/dev/null || echo "")
            if [ -z "$HOSTNAME" ]; then
              echo "Web App not found — Bicep provisioning deferred."
              exit 0
            fi
            echo "Testing https://$HOSTNAME/health"
            for i in {1..10}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$HOSTNAME/health)
              echo "Attempt $i: HTTP $STATUS"
              if [ "$STATUS" == "200" ]; then
                echo "Smoke test passed!"
                exit 0
              fi
              sleep 10
            done
            echo "Smoke test failed after 10 attempts"
            exit 1

      - name: Verify Azure Monitor Alerts
        continue-on-error: true
        uses: azure/CLI@v2
        with:
          inlineScript: |
            RG="${{ env.AZURE_RESOURCE_GROUP }}"
            echo "Verifying Azure Monitor alerts in RG: $RG"
            ALERTS=$(az monitor metrics alert list \
              --resource-group "$RG" \
              --query "[].{name:name, enabled:enabled}" \
              --output tsv 2>/dev/null)
            if [ -z "$ALERTS" ]; then
              echo "Warning: No metric alerts found"
            else
              echo "$ALERTS"
              echo "Alerts verified successfully"
            fi